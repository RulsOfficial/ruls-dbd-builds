name: Propose Build
description: Submit your own build to the proyect.
title: ""
labels: ["build"]

body:
  - type: dropdown
    id: type
    attributes:
      label: Build type
      options:
        - Survivor
        - Killer
    validations:
      required: true

  - type: input
    id: perk1
    attributes:
      label: Perk 1
      placeholder: First perk
    validations:
      required: true

  - type: input
    id: perk2
    attributes:
      label: Perk 2
      placeholder: Second perk
    validations:
      required: true

  - type: input
    id: perk3
    attributes:
      label: Perk 3
      placeholder: Third perk
    validations:
      required: true

  - type: input
    id: perk4
    attributes:
      label: Perk 4
      placeholder: Fourth perk
    validations:
      required: true

  - type: input
    id: author
    attributes:
      label: Author
      placeholder: Your name
    validations:
      required: true
