name: Create Build from Issue

on:
  issues:
    types: [opened]

jobs:
  create-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Generate JSON build and PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Instalar dependencias
          npm install -g gh jq

          # Leer campos del issue
          ISSUE_BODY=$(jq -r '.issue.body' $GITHUB_EVENT_PATH)
          NAME=$(echo "$ISSUE_BODY" | grep '^name:' | cut -d':' -f2- | xargs)
          TYPE=$(echo "$ISSUE_BODY" | grep '^type:' | cut -d':' -f2- | xargs)
          KILLER=$(echo "$ISSUE_BODY" | grep '^killer:' | cut -d':' -f2- | xargs)
          PERKS=$(echo "$ISSUE_BODY" | grep '^perks:' | cut -d':' -f2- | xargs)
          ALTPERKS=$(echo "$ISSUE_BODY" | grep '^altperks:' | cut -d':' -f2- | xargs)
          GROUP=$(echo "$ISSUE_BODY" | grep '^group:' | cut -d':' -f2- | xargs)
          AUTHOR=$(echo "$ISSUE_BODY" | grep '^author:' | cut -d':' -f2- | xargs)

          # Añadir "Build" al nombre si no lo tiene
          if [[ "$NAME" != *build* ]]; then
            NAME="$NAME Build"
          fi

          # Ordenar perks alfabéticamente
          IFS=',' read -ra PERK_ARRAY <<< "$PERKS"
          SORTED_PERKS=$(printf '%s\n' "${PERK_ARRAY[@]}" | sort | paste -sd',' -)

          # Formatear nombre de archivo
          FILE_NAME=$(echo "$NAME" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -d "'")

          if [[ "$TYPE" == "Killer" ]]; then
            KILLER_NAME=$(echo "$KILLER" | tr '[:upper:]' '[:lower:]' | tr ' ' '-')
            FILE_NAME="${FILE_NAME}-${KILLER_NAME}"
            FOLDER="data/killer-builds"
          else
            FOLDER="data/survivor-builds"
          fi

          mkdir -p $FOLDER

          # Generar JSON
          echo "{
  \"name\": \"$NAME\",
  \"perks\": [$(echo $SORTED_PERKS | sed 's/,/","/g' | sed 's/^/"/' | sed 's/$/"/')],
  \"altperks\": [$(echo $ALTPERKS | sed 's/,/","/g' | sed 's/^/"/' | sed 's/$/"/')],
  $(if [[ "$TYPE" == "Survivor" ]]; then echo "\"group\": \"$GROUP\","; else echo "\"killer\": \"$KILLER\","; fi)
  \"author\": \"$AUTHOR\"
}" > $FOLDER/$FILE_NAME.json

          # Crear branch y PR
          BRANCH="add-build-$(date +%s)"
          git checkout -b $BRANCH
          git add $FOLDER/$FILE_NAME.json
          git commit -m "Add build: $NAME"
          git push origin $BRANCH

          # Crear PR usando gh CLI
          gh pr create --title "Add build: $NAME" --body "Automatically generated from Issue #${{ github.event.issue.number }}" --base main
